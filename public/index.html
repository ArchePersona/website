<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchePersona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #061d27;
      --cream: #f0ede8;
      --gold: #b8940a;
      --line: rgba(240, 237, 232, 0.14);
      --dim: rgba(240, 237, 232, 0.42);
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--black), #031117 72%);
      color: var(--cream);
      font-family: "JetBrains Mono", monospace;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER / DASHBOARD TOGGLE */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 29, 39, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .dashboard-toggle {
      background: rgba(184, 148, 10, 0.2);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }

    /* DASHBOARD — HIDDEN BY DEFAULT, SLIDES DOWN */
    .dashboard {
      display: none;
      overflow-y: auto;
      max-height: 40vh;
      padding: 12px;
      background: rgba(6, 29, 39, 0.8);
      border-bottom: 1px solid var(--line);
      gap: 8px;
    }

    .dashboard.open {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .agent-card, .tribunal-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .agent-card h3, .tribunal-card h3 {
      margin: 0 0 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
    }

    .signal-value {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .signal-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .signal-fill {
      height: 100%;
      background: var(--gold);
      transition: width 0.2s ease;
    }

    /* TRIBUNAL CARDS — SHOW ALL THREE CONSENSUS VALUES */
    .tribunal-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .tribunal-value {
      padding: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .flag-log-btn {
      background: rgba(184, 148, 10, 0.2);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      width: 100%;
    }

    /* CHAT — MAIN FOCUS */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bubble {
      word-wrap: break-word;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      max-width: 90%;
    }

    .bubble.user {
      margin-left: auto;
      background: rgba(240, 237, 232, 0.12);
      border: 1px solid var(--line);
    }

    .bubble.agent {
      background: rgba(184, 148, 10, 0.12);
      border: 1px solid rgba(184, 148, 10, 0.28);
    }

    /* INPUT AREA */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(6, 29, 39, 0.9);
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--cream);
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(184, 148, 10, 0.6);
    }

    button {
      padding: 8px 12px;
      background: rgba(184, 148, 10, 0.2);
      border: 1px solid var(--gold);
      border-radius: 6px;
      color: var(--gold);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      white-space: nowrap;
      min-width: 50px;
    }

    button:active {
      opacity: 0.7;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: flex-end;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--black);
      width: 100%;
      max-height: 80vh;
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--line);
      border-bottom: none;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 16px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--cream);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      min-width: auto;
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .flag-item {
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      font-size: 12px;
    }

    .flag-item:last-child {
      border-bottom: none;
    }

    .flag-time {
      color: var(--dim);
      font-size: 10px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(184, 148, 10, 0.3);
      border-radius: 2px;
    }

    @media (orientation: landscape) {
      .container {
        flex-direction: row;
      }

      .header {
        border-bottom: none;
        border-right: 1px solid var(--line);
        flex-direction: column;
        width: 120px;
        padding: 8px;
      }

      .dashboard {
        display: grid !important;
        max-height: none;
        flex: 1;
        border-bottom: none;
        border-right: 1px solid var(--line);
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 8px;
        overflow-y: auto;
      }

      .chat-container {
        flex: 2;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ArchePersona</h1>
      <button class="dashboard-toggle" onclick="toggleDashboard()">Data</button>
    </div>

    <div class="dashboard" id="dashboard">
      <!-- AGENTS -->
      <div class="agent-card">
        <h3>Perception</h3>
        <div class="signal-value" id="perception-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="perception-fill"></div></div>
      </div>

      <div class="agent-card">
        <h3>Memory</h3>
        <div class="signal-value" id="memory-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="memory-fill"></div></div>
      </div>

      <div class="agent-card">
        <h3>Reason</h3>
        <div class="signal-value" id="reason-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="reason-fill"></div></div>
      </div>

      <div class="agent-card">
        <h3>Threat</h3>
        <div class="signal-value" id="threat-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="threat-fill"></div></div>
      </div>

      <div class="agent-card">
        <h3>Social</h3>
        <div class="signal-value" id="social-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="social-fill"></div></div>
      </div>

      <div class="agent-card">
        <h3>Reward</h3>
        <div class="signal-value" id="reward-value">0.0</div>
        <div class="signal-bar"><div class="signal-fill" id="reward-fill"></div></div>
      </div>

      <!-- TRIBUNAL -->
      <div class="tribunal-card" style="grid-column: 1 / -1;">
        <h3>Tribunal Consensus</h3>
        <div class="tribunal-row">
          <div>
            <div style="font-size: 10px; color: var(--dim);">SENTINEL</div>
            <div class="tribunal-value" id="sentinel-value">0</div>
          </div>
          <div>
            <div style="font-size: 10px; color: var(--dim);">EMPATH</div>
            <div class="tribunal-value" id="empath-value">0</div>
          </div>
          <div>
            <div style="font-size: 10px; color: var(--dim);">ARBITER</div>
            <div class="tribunal-value" id="arbiter-value">0</div>
          </div>
        </div>
      </div>

      <!-- STATE & MODE -->
      <div class="agent-card">
        <h3>State</h3>
        <div class="signal-value" id="state-value" style="font-size: 14px;">FOCUSED</div>
      </div>

      <div class="agent-card">
        <h3>Mode</h3>
        <div class="signal-value" id="mode-value" style="font-size: 14px;">NORMAL</div>
      </div>

      <button class="flag-log-btn" onclick="openFlagLog()">Flag Log</button>
    </div>

    <div class="chat-container">
      <div class="chat-window" id="chatWindow"></div>
      <div class="input-area">
        <textarea id="userInput" placeholder="Type..."></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- FLAG LOG MODAL -->
  <div class="modal" id="flagModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Flags</h2>
        <button class="modal-close" onclick="closeFlagLog()">×</button>
      </div>
      <div class="modal-body" id="flagList"></div>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const dashboard = document.getElementById('dashboard');
    const flagModal = document.getElementById('flagModal');
    const flagList = document.getElementById('flagList');

    let conversation = [];
    let flagLog = [];

    function toggleDashboard() {
      dashboard.classList.toggle('open');
    }

    function openFlagLog() {
      flagList.innerHTML = flagLog.length ?
        flagLog.reverse().map(f => 
          `<div class="flag-item"><span class="flag-time">${f.time}</span><div>${f.msg}</div></div>`
        ).join('') :
        '<p style="color: var(--dim); font-size: 12px;">No flags yet.</p>';
      flagModal.classList.add('open');
    }

    function closeFlagLog() {
      flagModal.classList.remove('open');
    }

    function addMessage(role, text) {
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;
      chatWindow.appendChild(bubble);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function updateAgents(agents) {
      Object.entries(agents).forEach(([key, value]) => {
        const percent = (value * 100).toFixed(0);
        const fillEl = document.getElementById(`${key.toLowerCase()}-fill`);
        const valueEl = document.getElementById(`${key.toLowerCase()}-value`);
        
        if (fillEl) fillEl.style.width = percent + '%';
        if (valueEl) valueEl.textContent = value.toFixed(1);
      });
    }

    function updateTribunal(sentinel, empath, arbiter) {
      document.getElementById('sentinel-value').textContent = sentinel;
      document.getElementById('empath-value').textContent = empath;
      document.getElementById('arbiter-value').textContent = arbiter;
    }

    function updateState(state, mode) {
      document.getElementById('state-value').textContent = state;
      document.getElementById('mode-value').textContent = mode;
    }

    function addFlag(message) {
      const time = new Date().toLocaleTimeString();
      flagLog.push({ time, msg: message });
      if (flagLog.length > 50) flagLog.shift();
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage('user', message);
      conversation.push({ role: 'user', content: message });
      userInput.value = '';
      userInput.style.height = '40px';
      sendBtn.disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, conversation })
        });

        if (!response.ok) throw new Error(`Error ${response.status}`);

        const data = await response.json();

        updateAgents(data.agents);
        updateTribunal(data.tribunal.sentinel, data.tribunal.empath, data.tribunal.arbiter);
        updateState(data.state, data.mode);
        
        data.flags.forEach(flag => addFlag(flag));

        addMessage('agent', data.reply);
        conversation.push({ role: 'assistant', content: data.reply });

      } catch (error) {
        addMessage('agent', `Error: ${error.message}`);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = '40px';
      userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
    });

    // Close modal on background click
    flagModal.addEventListener('click', (e) => {
      if (e.target === flagModal) closeFlagLog();
    });

    addMessage('agent', 'ArchePersona online.');
  </script>
</body>
</html>
